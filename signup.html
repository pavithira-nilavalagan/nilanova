<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" type="image/png" href="images/download.png">
    <title>Create Account | NilaNova</title>

    <link rel="stylesheet" href="css/auth.css">

    <link href="https://cdn.jsdelivr.net/npm/remixicon/fonts/remixicon.css" rel="stylesheet">
</head>

<body>

    <div class="auth-container">

        <div class="logo">
            <h1>NilaNova</h1>
            <p>Create your account</p>
        </div>

        <form id="signupForm">

            <div class="input-box">
                <label>Full Name</label>
                <input
                    type="text"
                    id="name"
                    placeholder="Enter your name"
                    required>
            </div>

            <div class="input-box">
                <label>Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="Enter email"
                    required>
            </div>

            <div class="input-box">
                <label>Password</label>

                <div class="password-box">
                    <input
                        type="password"
                        id="password"
                        placeholder="Minimum 6 characters"
                        required>

                    <i class="ri-eye-line toggle" onclick="togglePassword('password',this)"></i>
                </div>
            </div>

            <div class="input-box">
                <label>Confirm Password</label>

                <div class="password-box">

                    <input
                        type="password"
                        id="confirmPassword"
                        placeholder="Confirm password"
                        required>

                    <i class="ri-eye-line toggle" onclick="togglePassword('confirmPassword',this)"></i>

                </div>
            </div>

            <button class="btn">
                Create Account
            </button>

        </form>

        <div class="divider">
            Already have an account?
        </div>

        <a href="signin.html" class="secondary-btn">
            Sign In
        </a>

    </div>

    <script src="js/auth.js"></script>

</body>

</html>
